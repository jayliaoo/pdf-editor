<h2>PDF Editor 界面布局</h2>
<p class="subtitle">选择你喜欢的布局风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>经典三栏布局</h3>
      <p>左侧: 文件标签页 | 中间: PDF预览 | 右侧: 页面缩略图</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="display:flex;height:200px">
          <div class="mock-sidebar" style="width:120px;background:#f0f0f0;padding:8px">
            <div style="background:#ddd;height:16px;margin-bottom:8px;border-radius:4px">Tab 1.pdf</div>
            <div style="background:#ddd;height:16px;margin-bottom:8px;border-radius:4px;opacity:0.5">Tab 2.pdf</div>
            <div style="background:#ddd;height:16px;border-radius:4px;opacity:0.5">Tab 3.pdf</div>
          </div>
          <div class="placeholder" style="flex:1;background:#e8e8e8">PDF 预览区域</div>
          <div class="mock-sidebar" style="width:140px;background:#f5f5f5;padding:8px">
            <div style="background:#ccc;height:80px;margin-bottom:8px;border-radius:4px">页 1</div>
            <div style="background:#ccc;height:80px;margin-bottom:8px;border-radius:4px">页 2</div>
            <div style="background:#ccc;height:80px;border-radius:4px">页 3</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左右布局 + 底部缩略图</h3>
      <p>左侧: 文件标签页 | 中间: PDF预览 | 底部: 页面缩略图栏</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="display:flex;flex-direction:column;height:200px">
          <div style="display:flex;flex:1">
            <div class="mock-sidebar" style="width:100px;background:#f0f0f0;padding:8px">
              <div style="background:#ddd;height:16px;margin-bottom:8px;border-radius:4px">Tab 1</div>
              <div style="background:#ddd;height:16px;border-radius:4px;opacity:0.5">Tab 2</div>
            </div>
            <div class="placeholder" style="flex:1;background:#e8e8e8">PDF 预览区域</div>
          </div>
          <div style="height:70px;background:#f5f5f5;padding:8px;display:flex;gap:8px;align-items:center">
            <div style="background:#ccc;width:50px;height:50px;border-radius:4px">1</div>
            <div style="background:#ccc;width:50px;height:50px;border-radius:4px">2</div>
            <div style="background:#ccc;width:50px;height:50px;border-radius:4px">3</div>
            <div style="background:#ccc;width:50px;height:50px;border-radius:4px">4</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单栏 + 悬浮缩略图</h3>
      <p>顶部: 文件标签页 | 中间: PDF预览 | 鼠标悬停时显示缩略图</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="display:flex;flex-direction:column;height:200px">
          <div style="height:32px;background:#e0e0e0;display:flex;align-items:center;padding:0 12px;gap:12px">
            <span>Tab 1.pdf</span>
            <span style="opacity:0.5">Tab 2.pdf</span>
            <span style="opacity:0.5">+</span>
          </div>
          <div class="placeholder" style="flex:1;background:#e8e8e8;display:flex;align-items:center;justify-content:center">
            <div style="background:white;padding:12px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
              PDF 预览 (悬停查看缩略图)
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
